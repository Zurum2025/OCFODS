{% extends "vendor/layout.html" %}

{% block vendor_content %}
<h1>Settings</h1>

<form method="POST">
    <table class="app-table">
        <tr>
            <th>Food</th>
            <th>Category</th>
            <th>Price (₦)</th>
            <th>Available</th>
        </tr>

        {% for food in foods %}
        <tr>
            <td>{{ food.name }}</td>
            <td>{{ food.category.name }}</td>
            <td>
                <input type="number"
                        name = "price_{{food.id}}"
                        value = "{{ food.price }}"
                        step = "0.01"
                        min = "0">
            </td>
            <td>
                <label class="switch">
                    <input type="checkbox"
                        name="available_{{ food.id }}"
                        {% if food.availability %}checked{% endif %}>
                    <span class="slider round"></span>
                    </label>
                    </td>
        </tr>
        {% endfor %}
    </table>
    
    <hr>

    <h3>Delivery Settings</h3>

    <div class="location-box">

        <p>
            Your current delivery rate:
            <strong>₦{{ current_user.delivery_fee_km }}/km</strong>
        </p>

        <label>Delivery Fee Per KM</label>

        <input
            type="number"
            step="0.01"
            name="delivery_fee_km"
            value="{{ current_user.delivery_fee_km }}"
        >

        <br><br>

        <button
            type="button"
            class="login-btn"
            onclick="saveVendorLocation()"
        >
            Update My Location
        </button>

        <p id="location-status"></p>

        <input type="hidden" name="latitude" id="latitude">
        <input type="hidden" name="longitude" id="longitude">
        <input type="hidden" name="address" id="address">

    </div>

    <br>

    <button class ="login-btn" type="submit">save changes</button>
</form>

<!-- Geolocation Script -->
<script>

    function saveVendorLocation() {
    
        if (!navigator.geolocation) {
            alert("Geolocation is not supported");
            return;
        }
    
        navigator.geolocation.getCurrentPosition(
            async function(position) {
    
                const lat = position.coords.latitude;
                const lng = position.coords.longitude;
    
                document.getElementById("latitude").value = lat;
                document.getElementById("longitude").value = lng;
    
                document.getElementById("location-status").innerHTML =
                    "Location captured successfully.";
    
            },
    
            function(error) {
                alert("Unable to retrieve location");
            }
        );
    }
    
    </script>
{% endblock %}
